name: Keep Alive — VIVA CONT

on:
  schedule:
    - cron: '*/5 * * * *'    # cada 5 minutos
  workflow_dispatch:           # también manual desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping VIVA CONT
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://vivacont.vivaempresasglobal.com/health)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: service returned $STATUS"
          else
            echo "Service is alive"
          fi
